<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رفيق القرآن</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#004b23">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="رفيق القرآن">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme">

    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <h2 class="dua-text">ادعوا لي ولوالدي بالرحمة</h2>
            <h3 class="welcome-text">يسر الله لك</h3>
        </div>
    </div>

    <div class="app-container" id="mainApp" style="display: none;">
        <header class="main-header">
            <div class="header-content">
                <h2 id="viewTitle">المصحف الشريف</h2>
                <button id="themeToggle" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <section id="homeScreen" class="screen active">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن سورة..." onkeyup="searchSurah()">
            </div>
            <div class="surahs-grid" id="surahGrid"></div>
        </section>

        <section id="readerScreen" class="screen hidden">
            <div class="reader-nav">
                <button onclick="switchScreen('home')"><i class="fas fa-chevron-right"></i> رجوع</button>
                <h3 id="currentSurahName">السورة</h3>
                <button onclick="toggleAudio()" id="playBtn"><i class="fas fa-play-circle"></i></button>
            </div>
            <div id="quranContent" class="quran-content uthmani-font"></div>
        </section>

        <section id="quizScreen" class="screen hidden">
            <div class="quiz-setup-card">
                <i class="fas fa-graduation-cap quiz-main-icon"></i>
                <h3>اختبار الحفظ الذكي</h3>
                <select id="quizType" class="custom-input">
                    <option value="random">أكمل الآية (عشوائي)</option>
                    <option value="next">ما هي الآية التالية؟</option>
                    <option value="prev">ما هي الآية السابقة؟</option>
                    <option value="mcq">اختر التكملة الصحيحة</option>
                </select>
                <div class="range-inputs">
                    <input type="number" id="pageStart" placeholder="من صفحة" min="1" max="604">
                    <input type="number" id="pageEnd" placeholder="إلى صفحة" min="1" max="604">
                </div>
                <button class="gold-btn" onclick="startQuiz()">ابدأ الاختبار</button>
            </div>
            <div id="quizArea" class="quiz-display hidden">
                <div class="quiz-card">
                    <span id="quizLocation"></span>
                    <div id="quizQuestion" class="uthmani-font"></div>
                    <div id="quizOptions" class="options-grid hidden"></div>
                    <button class="reveal-btn" id="revealBtn" onclick="revealAnswer()">تحقق من الإجابة</button>
                    <div id="quizAnswer" class="uthmani-font hidden"></div>
                </div>
                <button class="next-btn" onclick="startQuiz()">الآية التالية ➔</button>
            </div>
        </section>

        <div id="tafsirModal" class="modal hidden">
            <div class="modal-content">
                <div class="handle"></div>
                <h4 id="tafsirTitle">التفسير</h4>
                <p id="tafsirBody">...</p>
                <button class="close-btn" onclick="closeTafsir()">إغلاق</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" id="navHome" onclick="switchScreen('home')">
                <i class="fas fa-book-quran"></i><span>المصحف</span>
            </div>
            <div class="nav-item" id="navQuiz" onclick="switchScreen('quiz')">
                <i class="fas fa-brain"></i><span>اختبار</span>
            </div>
            <div class="nav-item" onclick="alert('خطة الحفظ قيد التحديث')">
                <i class="fas fa-calendar-check"></i><span>الخطة</span>
            </div>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
